<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Meitheal - Phone Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Animated aurora lights */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .aurora span {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: float 8s ease-in-out infinite;
        }

        .aurora span:nth-child(1) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #059669, transparent);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .aurora span:nth-child(2) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #0ea5e9, transparent);
            bottom: -80px;
            right: -80px;
            animation-delay: -3s;
        }

        .aurora span:nth-child(3) {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #6366f1, transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: scale(1) translateY(0px);
            }

            50% {
                transform: scale(1.1) translateY(-20px);
            }
        }

        .phone {
            width: 393px;
            height: 852px;
            background: #111;
            border-radius: 55px;
            box-shadow:
                0 0 0 2px #444,
                0 0 0 6px #222,
                0 0 40px rgba(0, 0, 0, 0.8),
                inset 0 0 0 2px #333;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Side buttons */
        .phone::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 140px;
            width: 4px;
            height: 34px;
            background: #333;
            border-radius: 3px 0 0 3px;
            box-shadow: 0 50px 0 #333, 0 100px 0 #333;
        }

        .phone::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 190px;
            width: 4px;
            height: 70px;
            background: #333;
            border-radius: 0 3px 3px 0;
        }

        /* Notch / Dynamic Island */
        .notch {
            width: 120px;
            height: 34px;
            background: #111;
            border-radius: 0 0 20px 20px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .notch .camera {
            width: 12px;
            height: 12px;
            background: #222;
            border-radius: 50%;
            border: 1px solid #333;
        }

        .notch .speaker {
            width: 50px;
            height: 6px;
            background: #222;
            border-radius: 3px;
        }

        /* Status bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 24px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
            background: transparent;
        }

        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .battery {
            width: 24px;
            height: 12px;
            border: 1.5px solid white;
            border-radius: 3px;
            position: relative;
        }

        .battery::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 6px;
            background: white;
            border-radius: 0 2px 2px 0;
        }

        .battery-fill {
            height: 100%;
            width: 80%;
            background: white;
            border-radius: 1px;
        }

        /* App iframe */
        .screen {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: white;
        }

        .screen iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Home bar */
        .home-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            pointer-events: none;
        }

        .home-bar-line {
            width: 120px;
            height: 5px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 3px;
        }

        /* Outer glow */
        .glow {
            position: absolute;
            inset: -20px;
            background: radial-gradient(ellipse at center, rgba(5, 150, 105, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>

<body>
    <div class="aurora">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="glow"></div>
    <div class="phone">
        <div class="notch">
            <div class="speaker"></div>
            <div class="camera"></div>
        </div>
        <div class="status-bar">
            <span id="clock">9:41</span>
            <div class="status-icons">
                <!-- WiFi icon -->
                <svg width="16" height="12" viewBox="0 0 16 12" fill="white">
                    <path
                        d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm0-3.5a7 7 0 0 1 4.95 2.05L11.54 9.46A5 5 0 0 0 8 8a5 5 0 0 0-3.54 1.46L3.05 8.05A7 7 0 0 1 8 6zm0-4a11 11 0 0 1 7.78 3.22L14.36 6.64A9 9 0 0 0 8 4a9 9 0 0 0-6.36 2.64L.22 5.22A11 11 0 0 1 8 2z" />
                </svg>
                <!-- Battery -->
                <div class="battery">
                    <div class="battery-fill"></div>
                </div>
            </div>
        </div>
        <div class="screen">
            <!-- Points to Meitheal Volunteer Dashboard (Cache Busted) -->
            <iframe src="http://localhost:3000/volunteer?v=drawer_fix_history" title="Meitheal"></iframe>
            <div class="home-bar">
                <div class="home-bar-line"></div>
            </div>
        </div>
    </div>

    <script>
        // Live clock
        function updateClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m;
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>

</html>
