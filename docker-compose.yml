version: '3.8'

services:
  db:
    image: postgres:16
    container_name: meitheal_db
    environment:
      POSTGRES_USER: meitheal_user
      POSTGRES_PASSWORD: meitheal_password
      POSTGRES_DB: meitheal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U meitheal_user -d meitheal_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meitheal_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://meitheal_user:meitheal_password@db:5432/meitheal_db
      - OLLAMA_URL=http://host.docker.internal:11434
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-dummy_token}
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meitheal_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/ws/rescues

volumes:
  postgres_data:


